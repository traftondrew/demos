<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualityAssist – Reporter Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#0e1117;--bg2:#161b25;--bg3:#1e2530;--bg4:#252d3a;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e8eaf0;--text2:#8b95a8;--text3:#5a6478;
  --blue:#4a9eff;--bdim:rgba(74,158,255,.12);--bbrd:rgba(74,158,255,.3);
  --amber:#f5a623;--adim:rgba(245,166,35,.12);
  --red:#ff6b6b;--rdim:rgba(255,107,107,.12);--rbrd:rgba(255,107,107,.3);
  --green:#4ade80;--gdim:rgba(74,222,128,.1);--gbrd:rgba(74,222,128,.3);
  --purple:#a78bfa;--pdim:rgba(167,139,250,.12);--pbrd:rgba(167,139,250,.3);
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:6px;--rl:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo{font-weight:600;font-size:15px;color:var(--blue);letter-spacing:-.3px;margin-right:6px}
.tdiv{width:1px;height:24px;background:var(--border2)}
.pt-name{font-weight:500;font-size:14px}
.pt-meta{font-size:11px;color:var(--text2)}
.study-pill{margin-left:auto;background:var(--bdim);border:1px solid var(--bbrd);border-radius:var(--r);padding:4px 10px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.tbs{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:4px 8px;font-size:12px;font-family:var(--font);cursor:pointer;outline:none}
.tbs:focus{border-color:var(--bbrd)}
.tbtn{background:none;border:1px solid transparent;border-radius:var(--r);color:var(--text2);cursor:pointer;padding:4px 9px;font-size:12px;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:var(--font)}
.tbtn:hover{background:var(--bg3);border-color:var(--border);color:var(--text)}
.tbtn:disabled{opacity:.35;cursor:not-allowed}
.tbtn.rec{background:var(--rdim);border-color:var(--rbrd);color:var(--red)}
.tbtn.step{background:var(--gdim);border-color:var(--gbrd);color:var(--green)}
.tsep{width:1px;height:20px;background:var(--border);margin:0 2px}

.analyzing{display:none;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.analyzing.on{display:flex}
.adot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

.lat{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px}
.latlbl{font-size:11px;color:var(--text2);white-space:nowrap}
.latslider{-webkit-appearance:none;appearance:none;width:76px;height:3px;background:var(--bg4);border-radius:2px;outline:none;cursor:pointer}
.latslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--blue);cursor:pointer}
.latval{font-size:11px;color:var(--blue);min-width:22px;font-weight:500}

.dprog{display:none;height:2px;background:var(--bg4);overflow:hidden;flex-shrink:0}
.dprog.on{display:block}
.dbar{height:100%;background:var(--red);width:0%;transition:width .1s linear}

.main{display:flex;flex:1;overflow:hidden}
.sidenav{width:44px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;flex-shrink:0}
.nico{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--text3);cursor:pointer;font-size:16px;transition:all .15s;border:1px solid transparent}
.nico:hover{background:var(--bg3);color:var(--text2)}
.nico.active{background:var(--bdim);color:var(--blue);border-color:var(--bbrd)}

.eda{flex:1;overflow-y:auto;padding:24px 32px;background:var(--bg)}

/* The editor renders spans for skeleton vs dictated text */
.editor{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);min-height:calc(100vh - 190px);padding:26px 30px;font-family:var(--mono);font-size:13px;line-height:1.85;color:var(--text);outline:none;white-space:pre-wrap;word-wrap:break-word;cursor:text;transition:border-color .2s}
.editor:focus{border-color:var(--border2)}

/* skeleton placeholder text — dimmed, italic */
.skel{color:var(--text3);font-style:italic}

/* blinking cursor */
.dictcursor{display:inline-block;width:2px;height:1em;background:var(--blue);vertical-align:text-bottom;animation:cblink .9s step-end infinite;margin-left:1px}
@keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}

/* issue highlights */
.hl-disc{background:var(--rdim);border-bottom:2px solid var(--red);border-radius:2px;cursor:pointer}
.hl-gram{background:var(--adim);border-bottom:2px solid var(--amber);border-radius:2px;cursor:pointer}
.hl-bill{background:var(--pdim);border-bottom:2px solid var(--purple);border-radius:2px;cursor:pointer}

/* autocorrect spelling fix — shows only the green corrected word */
.hl-auto{cursor:pointer;display:inline}
.hl-auto-orig{display:none}
.hl-auto-new{color:var(--green);font-weight:600;background:var(--gdim);border-radius:2px;padding:0 2px;border-bottom:2px solid var(--green)}

/* inline suggestion ghost for non-autocorrect items */
.hl-sugg{display:inline;margin-left:4px;padding:1px 5px;background:var(--gdim);border:1px solid var(--gbrd);border-radius:3px;color:var(--green);font-size:.88em;font-weight:500;cursor:pointer;white-space:nowrap;animation:suggin .22s ease-out}
@keyframes suggin{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}

/* hover popover on highlighted spans */
.hl-popover{
  position:fixed;z-index:9999;
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);
  padding:8px 10px;min-width:180px;max-width:260px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  pointer-events:auto;
  animation:popin .15s ease-out;
}
@keyframes popin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hl-popover-reason{font-size:11px;color:var(--text2);line-height:1.45;margin-bottom:8px}
.hl-popover-acts{display:flex;gap:6px}
.hl-popover-acc{flex:1;background:var(--blue);border:none;border-radius:var(--r);color:#fff;cursor:pointer;padding:4px 0;font-size:11px;font-family:var(--font);font-weight:500;transition:background .12s}
.hl-popover-acc:hover{background:#3a8eef}
.hl-popover-dis{flex:1;background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);cursor:pointer;padding:4px 0;font-size:11px;font-family:var(--font);transition:all .12s}
.hl-popover-dis:hover{background:var(--bg4);color:var(--text)}
.hl-popover-vocab{width:100%;margin-top:6px;background:none;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);cursor:pointer;padding:4px 0;font-size:10px;font-family:var(--font);transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px}
.hl-popover-vocab:hover{border-color:var(--green);color:var(--green);background:var(--gdim)}

/* dual-section discrepancy card */
.disc-section{padding:6px 8px;border-radius:var(--r);margin-bottom:5px}
.disc-section:last-child{margin-bottom:0}
.disc-section-findings{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.18)}
.disc-section-impression{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.18)}
.disc-section-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:3px}
.disc-section-text{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px}
.disc-section-sugg{font-size:11px;color:var(--green);margin-bottom:5px}
.disc-section-btn{background:var(--bdim);border:1px solid var(--bbrd);border-radius:var(--r);color:var(--blue);cursor:pointer;padding:3px 8px;font-size:11px;font-family:var(--font);font-weight:500;transition:all .12s}
.disc-section-btn:hover{background:rgba(74,158,255,.22)}

/* resolved issues section */
.resolved-section{border-top:1px solid var(--border);flex-shrink:0;max-height:40%;overflow-y:auto}
.resolved-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none}
.resolved-hdr:hover{background:var(--bg3)}
.resolved-hdr-label{font-size:11px;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:5px}
.resolved-hdr-count{background:var(--bg4);border-radius:10px;padding:1px 6px;font-size:10px;color:var(--text3);min-width:16px;text-align:center}
.resolved-body{padding:0 0 4px}
.resolved-card{margin:3px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:8px 10px;opacity:.65;transition:opacity .15s}
.resolved-card:hover{opacity:.9}
.resolved-card .ihead{margin-bottom:4px}
.resolved-card .ibody{font-size:11px;margin-bottom:4px}
.resolved-card .ireason{display:none}
.resolved-action-label{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px;margin-bottom:4px}
.resolved-action-label i{font-size:11px}
.btn-undo{background:none;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text3);cursor:pointer;padding:2px 8px;font-size:10px;font-family:var(--font);transition:all .12s;display:flex;align-items:center;gap:3px}
.btn-undo:hover{border-color:var(--amber);color:var(--amber);background:var(--adim)}

/* vocabulary tray — shown in QA panel when words have been added */
.vocab-tray{margin:8px 10px 4px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.vocab-tray-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;font-size:11px;color:var(--text2);cursor:pointer;user-select:none}
.vocab-tray-hdr:hover{color:var(--text)}
.vocab-tray-hdr span{font-weight:500}
.vocab-tray-body{padding:0 10px 8px;display:flex;flex-wrap:wrap;gap:5px}
.vocab-pill{display:flex;align-items:center;gap:4px;background:var(--gdim);border:1px solid var(--gbrd);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--green)}
.vocab-pill button{background:none;border:none;color:var(--green);cursor:pointer;padding:0;font-size:12px;line-height:1;opacity:.6;font-family:var(--font)}
.vocab-pill button:hover{opacity:1}

/* QA PANEL */
.qa-panel{width:300px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.qa-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.qa-tab{padding:10px 13px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.qa-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.qa-tab:hover:not(.active){color:var(--text)}

.badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;display:none;min-width:18px;text-align:center;line-height:16px}
.badge.pop{animation:bpop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes bpop{0%{transform:scale(1)}45%{transform:scale(1.6)}100%{transform:scale(1)}}

.qa-srch{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.qa-sw{position:relative}
.qa-sw input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px 5px 28px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.qa-sw input:focus{border-color:var(--bbrd)}
.qa-si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

.qa-fils{padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0}
.fp{padding:2px 8px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:none;font-family:var(--font);transition:all .12s}
.fp:hover,.fp.fa{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.fp.fd.on{background:var(--rdim);border-color:var(--rbrd);color:var(--red)}
.fp.fg.on{background:var(--adim);border-color:rgba(245,166,35,.3);color:var(--amber)}
.fp.fb.on{background:var(--pdim);border-color:var(--pbrd);color:var(--purple)}

.qa-list{flex:1;overflow-y:auto;padding:8px 0}
.qa-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:8px;font-size:12px}
.qa-empty i{font-size:28px}

.icard{margin:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:10px 12px;transition:border-color .15s,box-shadow .4s;cursor:pointer;animation:iin .28s ease-out}
@keyframes iin{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.icard.nf{box-shadow:0 0 0 2px var(--red);animation:iin .28s ease-out,flash .95s ease-out .28s forwards}
@keyframes flash{0%{box-shadow:0 0 0 2px var(--red)}100%{box-shadow:none}}
.icard:hover{border-color:var(--border2)}
.icard.hi{border-color:var(--bbrd);background:var(--bg4)}
.ihead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.imeta{font-size:10px;color:var(--text3)}
.ibdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.ibd{background:var(--rdim);color:var(--red);border:1px solid var(--rbrd)}
.ibm{background:var(--adim);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.ibb{background:var(--pdim);color:var(--purple);border:1px solid var(--pbrd)}
.ibody{font-size:12px;line-height:1.5;margin-bottom:6px}
.iold{color:var(--red);text-decoration:line-through;margin-right:3px}
.inew{color:var(--green);font-weight:500}
.ireason{font-size:11px;color:var(--text3);font-style:italic}
.iacts{display:flex;gap:6px;align-items:center;margin-top:8px}
.bdis{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer;padding:3px 8px;font-size:11px;font-family:var(--font);transition:all .12s}
.bdis:hover{color:var(--text2);border-color:var(--border2)}
.bacc{background:var(--bdim);border:1px solid var(--bbrd);border-radius:var(--r);color:var(--blue);cursor:pointer;padding:3px 10px;font-size:11px;font-family:var(--font);font-weight:500;transition:all .12s}
.bacc:hover{background:rgba(74,158,255,.22)}
.buall{background:var(--bdim);border:1px solid var(--bbrd);border-radius:var(--r);color:var(--blue);cursor:pointer;padding:3px 10px;font-size:11px;font-family:var(--font);font-weight:500;transition:all .12s;margin-left:auto}
.autoapplied{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}

.qa-foot{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;flex-shrink:0}
.bdall{flex:1;background:none;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);cursor:pointer;padding:6px;font-size:12px;font-family:var(--font);transition:all .12s}
.bdall:hover{background:var(--bg3);color:var(--text)}
.baall{flex:1;background:var(--blue);border:none;border-radius:var(--r);color:#fff;cursor:pointer;padding:6px;font-size:12px;font-family:var(--font);font-weight:500;transition:all .12s}
.baall:hover{background:#3a8eef}

.abar{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.bdisc{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;font-family:var(--font);padding:6px 12px;border-radius:var(--r)}
.bdisc:hover{background:var(--rdim)}
.bact{padding:7px 16px;border-radius:var(--r);font-size:13px;font-family:var(--font);cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s}
.bact:hover{background:var(--bg4)}
.bsign{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.bsign:hover{background:#3a8eef}
.swrap{position:relative;margin-left:auto}
.sbadge{position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;border-radius:50%;width:19px;height:19px;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--bg2)}
.sbadge.pop{animation:bpop .35s cubic-bezier(.34,1.56,.64,1)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);padding:8px 16px;font-size:12px;color:var(--text);opacity:0;transition:all .25s;z-index:999;white-space:nowrap}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Sirona</div>
  <div class="tdiv"></div>
  <div id="ptInfo">
    <div class="pt-name">Burgundy, Ron W.</div>
    <div class="pt-meta">DOB: 06/14/1962 (60y) | M | MRN: 1962001</div>
  </div>
  <div class="study-pill">
    <div class="sdot"></div>
    <span id="studyPill">CT BRAIN W/O CONT (ACC: 123456780), 04/21/23 09:57 AM</span>
  </div>
</div>

<div class="toolbar">
  <span style="font-size:11px;color:var(--text3)">Template:</span>
  <select class="tbs" id="tmplSel" onchange="loadTmpl(this.value)">
    <option value="ct_brain">CT Brain W/O Contrast</option>
    <option value="ct_chest">CT Chest W/O Contrast</option>
    <option value="xray_chest">CXR Two-View</option>
    <option value="ct_abdomen">CT Abdomen/Pelvis W/O Contrast</option>
    <option value="mri_brain">MRI Brain W/ Contrast</option>
  </select>
  <div class="tsep"></div>
  <button class="tbtn" id="btnStart" onclick="startDict()">
    <i class="ti ti-microphone"></i> Start Dictation
  </button>
  <button class="tbtn step" id="btnNext" onclick="nextSentence()" style="display:none">
    <i class="ti ti-player-skip-forward"></i> Next Sentence
    <span id="sentCtr" style="font-size:10px;opacity:.6"></span>
  </button>
  <button class="tbtn rec" id="btnStop" onclick="stopDict()" style="display:none">
    <i class="ti ti-square"></i> Stop
  </button>
  <div class="analyzing" id="analyzing">
    <div class="adot"></div> QualityAssist analyzing…
  </div>
  <div class="lat">
    <span class="latlbl"><i class="ti ti-clock" style="font-size:11px"></i> QA latency:</span>
    <input type="range" class="latslider" id="latSlider" min="2" max="10" step="1" value="3" oninput="setLat(this.value)">
    <span class="latval" id="latVal">3s</span>
  </div>
</div>

<div class="dprog" id="dprog"><div class="dbar" id="dbar"></div></div>

<div class="main">
  <div class="sidenav">
    <div class="nico active"><i class="ti ti-file-text" aria-hidden="true"></i></div>
    <div class="nico"><i class="ti ti-layout-grid" aria-hidden="true"></i></div>
    <div class="nico"><i class="ti ti-history" aria-hidden="true"></i></div>
    <div class="nico"><i class="ti ti-list" aria-hidden="true"></i></div>
    <div class="nico" style="margin-top:auto"><i class="ti ti-settings" aria-hidden="true"></i></div>
    <div class="nico"><i class="ti ti-help-circle" aria-hidden="true"></i></div>
  </div>

  <div class="eda">
    <div class="editor" id="editor" contenteditable="true" spellcheck="false"></div>
  </div>

  <div class="qa-panel">
    <div class="qa-tabs">
      <div class="qa-tab" onclick="swTab(this)">Templates</div>
      <div class="qa-tab" onclick="swTab(this)">Macros</div>
      <div class="qa-tab active" onclick="swTab(this)">QualityAssist <span class="badge" id="qBadge"></span></div>
    </div>
    <div class="qa-srch">
      <div class="qa-sw">
        <i class="ti ti-search qa-si" aria-hidden="true"></i>

    `<div class="pt-name">${s.pt}</div><div class="pt-meta">${s.meta}</div>`;

}

function setLat(v){ lat=parseInt(v); document.getElementById('latVal').textContent=v+'s'; }
function swTab(el){ document.querySelectorAll('.qa-tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }
function setFil(f,el){

/* ═══════════════════════════════════════════════════════════════════════════
   SKELETON RENDERER
   Parses the skeleton string, splitting on «TOKEN» placeholders.
   Filled slots show dictated text; unfilled slots show dimmed placeholder.
   No-ops in free-edit mode — use rebuildFreeEditor() instead.
═══════════════════════════════════════════════════════════════════════════ */
function renderSkeleton(showCursor){
  if(freeEdit){ rebuildFreeEditor(); return; }
  const skel=SKELETONS[currentTmpl]||'';
  // Split on «...» tokens
  const parts=skel.split(/(«[A-Z_]+»)/g);
  let html='';
  parts.forEach(part=>{
    const m=part.match(/^«([A-Z_]+)»$/);
    if(m){
      const token=m[1];
      const filled=slotContent[token];
      if(filled!=null){
        // Apply issue highlights to the filled content, passing slot name
        // so dual-disc issues only apply their relevant half here
        html+=applyHighlights(esc(filled), token);
      } else {
        // Show dim placeholder
        html+=`<span class="skel">[${token.toLowerCase().replace(/_/g,' ')}]</span>`;
      }
    } else {
      // Static skeleton text (section headers etc.)
      html+=esc(part);
    }
  });
  html=html.replace(/\n/g,'<br>');
  if(showCursor) html+=`<span class="dictcursor"></span>`;
  document.getElementById('editor').innerHTML=html;
}

/* Rebuild editor HTML from editorText (free-edit mode) preserving cursor position */
function rebuildFreeEditor(){
  const ed=document.getElementById('editor');
  const sel=window.getSelection();

  // Measure caret as offset into the raw visible text (what the user sees)
  let caretOffset=0;
  if(sel&&sel.rangeCount>0){
    try{
      const range=sel.getRangeAt(0);
      // Walk all text nodes before the caret to sum up character count
      const walker=document.createTreeWalker(ed,NodeFilter.SHOW_TEXT,{
        acceptNode(node){
          if(node.parentElement?.closest('.hl-sugg')) return NodeFilter.FILTER_REJECT;
          if(node.parentElement?.classList.contains('hl-auto-orig')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      let n=walker.nextNode();
      while(n){
        if(n===range.endContainer){
          caretOffset+=range.endOffset;
          break;
        }
        caretOffset+=n.length;
        n=walker.nextNode();
      }
    }catch(e){ caretOffset=editorText.length; }
  }

  let html=applyHighlights(esc(editorText));
  html=html.replace(/\n/g,'<br>');
  ed.innerHTML=html;

  // Restore caret into the rebuilt text nodes
  try{
    if(sel){
      let remaining=caretOffset;
      const walker=document.createTreeWalker(ed,NodeFilter.SHOW_TEXT,{
        acceptNode(node){
          if(node.parentElement?.closest('.hl-sugg')) return NodeFilter.FILTER_REJECT;
          if(node.parentElement?.classList.contains('hl-auto-orig')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      let node=walker.nextNode();
      while(node){
        if(remaining<=node.length){
          const r=document.createRange();
          r.setStart(node,remaining);
          r.collapse(true);
          sel.removeAllRanges();
          sel.addRange(r);
          break;
        }
        remaining-=node.length;
        node=walker.nextNode();
      }
    }
  }catch(e){}
}

/* Apply all current issue highlights + suggestion ghosts to a plain-text segment */
function applyHighlights(escapedText, slotHint){
  let html=escapedText;
  issues.forEach(issue=>{
    if(!issue.original_text) return;
    const isAuto = issue.issue_type==='Autocorrect';
    const isDualDisc = issue.category==='Discrepancy' && issue.findings_text && issue.impression_text;

    if(isDualDisc){
      const escFindings   = esc(issue.findings_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const escImpression = esc(issue.impression_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const findingsSpan   = `<span class="hl-disc" data-id="${issue.id}" data-side="findings">$1</span>`;
      const impressionSpan = `<span class="hl-disc" data-id="${issue.id}" data-side="impression">$1</span>`;

      if(slotHint){
        // Per-slot mode from renderSkeleton — only apply the half for this slot
        if(slotHint === 'IMPRESSION'){
          html=html.replace(new RegExp(`(${escImpression})`,'i'), impressionSpan);
        } else {
          // Any other slot (FINDINGS, TECHNIQUE, etc.) — apply findings half
          html=html.replace(new RegExp(`(${escFindings})`,'i'), findingsSpan);
        }
      } else {
        // Full-text mode from rebuildFreeEditor — split at IMPRESSION: label
        const splitIdx = html.indexOf('IMPRESSION:');
        if(splitIdx !== -1){
          html = html.slice(0, splitIdx).replace(new RegExp(`(${escFindings})`,'i'), findingsSpan)
               + html.slice(splitIdx).replace(new RegExp(`(${escImpression})`,'i'), impressionSpan);
        } else {
          html=html.replace(new RegExp(`(${escFindings})`,'i'), findingsSpan);
          html=html.replace(new RegExp(`(${escImpression})`,'i'), impressionSpan);
        }
      }
    } else if(isAuto && issue.suggested_text){
      // Spelling autocorrect: replace the misspelling with green corrected word in the report
      const escapedOrig=esc(issue.original_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      html=html.replace(new RegExp(`(${escapedOrig})`,'i'),
        `<span class="hl-auto" data-id="${issue.id}"><span class="hl-auto-orig">${esc(issue.original_text)}</span><span class="hl-auto-new">${esc(issue.suggested_text)}</span></span>`);
    } else {
      const escapedOrig=esc(issue.original_text).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const cls=issue.category==='Discrepancy'?'hl-disc':issue.category==='Reimbursement'?'hl-bill':'hl-gram';
      // Only show inline suggestion ghost for discrepancies — grammar suggestions show in sidebar + hover only
      const ghost=(issue.suggested_text && issue.category!=='Grammar')
        ? `<span class="hl-sugg" data-id="${issue.id}">&rarr; ${esc(issue.suggested_text)}</span>`
        : '';
      html=html.replace(new RegExp(`(${escapedOrig})`,'i'),
        `<span class="${cls}" data-id="${issue.id}">$1</span>${ghost}`);
    }
  });
  return html;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DICTATION
═══════════════════════════════════════════════════════════════════════════ */
function startDict(){
  stepIdx=0; slotContent={};
  resetQa(); triggered.clear(); dictating=true;
  setDictUI('dictating');
  renderSkeleton(true);
  updateSentCtr();
}

function nextSentence(){
  const script=SCRIPTS[currentTmpl]||[];
  if(stepIdx>=script.length){ finishDict(); return; }

  const step=script[stepIdx]; stepIdx++;

  // Fill slots
  if(step.inserts){
    Object.assign(slotContent, step.inserts);
  }

  // Update progress bar
  document.getElementById('dbar').style.width=Math.round((stepIdx/script.length)*100)+'%';
  updateSentCtr();

  // Render with cursor
  renderSkeleton(stepIdx<script.length);

  // Scan all filled text for QA triggers
  const allText=Object.values(slotContent).join(' ');
  scan(allText, currentTmpl);

  if(stepIdx>=script.length) setTimeout(finishDict,400);
}

function finishDict(){
  dictating=false;
  // Extract plain text from current rendered skeleton as starting editorText
  editorText=extractPlainText(document.getElementById('editor'));
  freeEdit=true;
  // Rebuild with highlights but now in free-edit mode (no cursor span)
  rebuildFreeEditor();
  setDictUI('done');
  notify('Dictation complete — you can now edit the report directly');
}

function stopDict(){ forceStop(); }

function forceStop(){
  dictating=false;
  editorText=extractPlainText(document.getElementById('editor'));
  freeEdit=true;
  rebuildFreeEditor();
  setDictUI('idle');
  document.getElementById('dbar').style.width='0%';
}

function setDictUI(mode){
  const s=document.getElementById('btnStart');
  const n=document.getElementById('btnNext');
  const p=document.getElementById('btnStop');
  const dp=document.getElementById('dprog');
  if(mode==='idle'){
    s.style.display='flex'; s.disabled=false; s.innerHTML='<i class="ti ti-microphone"></i> Start Dictation';
    n.style.display='none'; p.style.display='none'; dp.classList.remove('on');
  } else if(mode==='dictating'){
    s.style.display='none';
    n.style.display='flex'; n.disabled=false;
    p.style.display='flex'; dp.classList.add('on');
  } else if(mode==='done'){
    s.style.display='flex'; s.innerHTML='<i class="ti ti-microphone"></i> Restart';
    n.style.display='none'; p.style.display='none';
  }
}

function updateSentCtr(){
  const total=(SCRIPTS[currentTmpl]||[]).length;
  document.getElementById('sentCtr').textContent=` ${stepIdx}/${total}`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOCK QA ENGINE
═══════════════════════════════════════════════════════════════════════════ */
function scan(text,k){
  (BANK[k]||[]).forEach(entry=>{
    if(triggered.has(entry.issue.id)) return;
    // skip if the flagged word/phrase has been added to vocabulary
    if(entry.issue.original_text && vocabulary.has(entry.issue.original_text.toLowerCase())) return;
    if(text.includes(entry.trigger)){
      triggered.add(entry.issue.id);
      schedule(entry.issue);
    }
  });
}

function schedule(issue){
  processingN++;
  document.getElementById('analyzing').classList.add('on');
  const t=setTimeout(()=>{
    processingN=Math.max(0,processingN-1);
    if(!processingN) document.getElementById('analyzing').classList.remove('on');
    deliver(issue);
  }, lat*1000);
  pendingTOs.push(t);
}

function deliver(issue){
  if(issues.find(i=>i.id===issue.id)) return;
  issues.push(issue);
  bump(issues.length,true);
  document.getElementById('qaEmpty')?.remove();
  if(matches(issue)) document.getElementById('qaList').insertAdjacentHTML('afterbegin',mkCard(issue,true));
  renderSkeleton(dictating);
}

/* ═══════════════════════════════════════════════════════════════════════════
   BADGE
═══════════════════════════════════════════════════════════════════════════ */
function bump(n,isNew){
  const qb=document.getElementById('qBadge'), sb=document.getElementById('sBadge');
  if(n>0){
    qb.style.display=sb.style.display='flex';
    qb.textContent=sb.textContent=n;
    if(isNew){[qb,sb].forEach(b=>{b.classList.remove('pop');void b.offsetWidth;b.classList.add('pop');});}
  } else { qb.style.display=sb.style.display='none'; }
}

/* ═══════════════════════════════════════════════════════════════════════════
   ISSUE LIST
═══════════════════════════════════════════════════════════════════════════ */
function matches(issue){
  if(fil==='all') return true;
  if(fil==='disc'&&issue.category==='Discrepancy') return true;
  if(fil==='gram'&&issue.category==='Grammar') return true;
  if(fil==='bill'&&issue.category==='Reimbursement') return true;
  return false;
}

function renderList(){
  const q=document.getElementById('srch').value.toLowerCase();
  const filtered=issues.filter(i=>{
    if(!matches(i)) return false;
    if(q&&!(i.original_text+' '+i.reason+' '+i.label).toLowerCase().includes(q)) return false;
    return true;
  });
  const list=document.getElementById('qaList');
  if(!filtered.length){
    list.innerHTML=`<div class="qa-empty" id="qaEmpty">
      <i class="ti ti-${issues.length?'filter':'shield-check'}" aria-hidden="true"></i>
      <span>${issues.length?'No issues match filter':'Issues appear as you dictate'}</span>
    </div>`;
    return;
  }
  list.innerHTML=filtered.map(i=>mkCard(i,false)).join('');
}

function mkCard(issue,isNew){
  const bc=issue.category==='Discrepancy'?'ibd':issue.category==='Reimbursement'?'ibb':'ibm';
  const auto=issue.issue_type==='Autocorrect';
  const isDualDisc = issue.category==='Discrepancy' && issue.findings_text && issue.impression_text;
  const hi=highlighted===issue.id;

  let body='', acts='';

  if(isDualDisc){
    // Findings section: current text + button to update it to match impression
    const findingsFixBtn = issue.suggested_text
      ? `<div class="disc-section-sugg">→ ${esc(issue.impression_text)}</div>
         <button class="disc-section-btn" onclick="accFindings('${issue.id}',event)">Fix Findings</button>`
      : '';
    // Impression section: current text + button to update it to match findings
    const impressionFixBtn = issue.suggested_text
      ? `<div class="disc-section-sugg">→ ${esc(issue.findings_text)}</div>
         <button class="disc-section-btn" onclick="accImpression('${issue.id}',event)">Fix Impression</button>`
      : '';

    body=`<div style="margin-bottom:8px">
      <div class="disc-section disc-section-findings">
        <div class="disc-section-label">Findings</div>
        <div class="disc-section-text">${esc(issue.findings_text)}</div>
        ${findingsFixBtn}
      </div>
      <div class="disc-section disc-section-impression" style="margin-top:5px">
        <div class="disc-section-label">Impression</div>
        <div class="disc-section-text">${esc(issue.impression_text)}</div>
        ${impressionFixBtn}
      </div>
    </div>`;
    acts=`<div class="iacts">
      <button class="bdis" onclick="dis('${issue.id}',event)">Ignore discrepancy</button>
    </div>`;

  } else if(auto){
    body=`<div class="ibody">
      <span class="iold">${esc(issue.original_text)}</span>
      <span style="margin:0 4px;color:var(--text3)">→</span><span class="inew">${esc(issue.suggested_text)}</span>
    </div>`;
    acts=`<div class="iacts">
      <div class="autoapplied"><i class="ti ti-circle-check" style="font-size:13px" aria-hidden="true"></i> Auto-corrected</div>
      <button class="bdis" style="margin-left:auto" onclick="revertAuto('${issue.id}',event)">Revert</button>
    </div>
    ${issue.category==='Grammar'
      ? `<div style="margin-top:6px"><button class="hl-popover-vocab" onclick="addToVocab('${issue.id}')"><i class="ti ti-book-2" style="font-size:10px"></i> Revert &amp; add to vocabulary</button></div>`
      : ''}`;

  } else if(issue.issue_type==='Alert'){
    body=`<div class="ibody" style="color:var(--text2)"><i class="ti ti-alert-triangle" style="font-size:12px;color:var(--amber);margin-right:4px" aria-hidden="true"></i>${esc(issue.original_text)}</div>`;
    acts=`<div class="iacts"><button class="bdis" onclick="dis('${issue.id}',event)">Dismiss</button></div>`;

  } else {
    // Suggestion (non-auto, non-disc)
    body=`<div class="ibody"><span class="iold">${esc(issue.original_text)}</span> <span class="inew">→ ${esc(issue.suggested_text||'')}</span></div>`;
    acts=`<div class="iacts">
      <button class="bdis" onclick="dis('${issue.id}',event)">Dismiss</button>
      <button class="bacc" onclick="acc('${issue.id}',event)">Accept</button>
    </div>`;
  }

  return `<div class="icard ${isNew?'nf':''} ${hi?'hi':''}" id="card-${issue.id}" onclick="hlCard('${issue.id}')">
    <div class="ihead"><span class="imeta">${esc(issue.label)}</span><span class="ibdg ${bc}">${esc(issue.category)}</span></div>
    ${body}<div class="ireason">${esc(issue.reason)}</div>${acts}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════════════════════════ */
function dis(id,e){
  e?.stopPropagation();
  removePopover();
  const iss=issues.find(i=>i.id===id);
  if(!iss) return;
  resolveIssue(iss, 'Dismissed');
  renderSkeleton(dictating);
}

function acc(id,e){
  e?.stopPropagation();
  removePopover();
  const iss=issues.find(i=>i.id===id);
  if(!iss) return;
  if(iss.original_text&&iss.suggested_text){
    const re=new RegExp(iss.original_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    Object.keys(slotContent).forEach(token=>{
      slotContent[token]=slotContent[token].replace(re, iss.suggested_text);
    });
    if(freeEdit) editorText=editorText.replace(re, iss.suggested_text);
  }
  resolveIssue(iss, 'Accepted');
  renderSkeleton(dictating);
  notify('Correction applied');
}

/* Fix Findings to match Impression — replace findings_text with impression_text */
function accFindings(id,e){
  e?.stopPropagation();
  removePopover();
  const iss=issues.find(i=>i.id===id);
  if(!iss) return;
  if(iss.findings_text&&iss.impression_text){
    const re=new RegExp(iss.findings_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    Object.keys(slotContent).forEach(token=>{
      slotContent[token]=slotContent[token].replace(re, iss.impression_text);
    });
    if(freeEdit) editorText=editorText.replace(re, iss.impression_text);
  }
  resolveIssue(iss, 'Fixed Findings');
  renderSkeleton(dictating);
  notify('Findings updated');
}

/* Fix Impression to match Findings — replace impression_text with findings_text */
function accImpression(id,e){
  e?.stopPropagation();
  removePopover();
  const iss=issues.find(i=>i.id===id);
  if(!iss) return;
  if(iss.findings_text&&iss.impression_text){
    const re=new RegExp(iss.impression_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    Object.keys(slotContent).forEach(token=>{
      slotContent[token]=slotContent[token].replace(re, iss.findings_text);
    });
    if(freeEdit) editorText=editorText.replace(re, iss.findings_text);
  }
  resolveIssue(iss, 'Fixed Impression');
  renderSkeleton(dictating);
  notify('Impression updated');
}

function dismissAll(){
  [...issues].forEach(iss => resolveIssue(iss, 'Dismissed'));
  renderSkeleton(dictating);
}

function acceptAll(){
  [...issues].forEach(iss=>{
    if(iss.original_text&&iss.suggested_text){
      const re=new RegExp(iss.original_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
      Object.keys(slotContent).forEach(token=>{ slotContent[token]=slotContent[token].replace(re,iss.suggested_text); });
      if(freeEdit) editorText=editorText.replace(re,iss.suggested_text);
    }
    resolveIssue(iss, 'Accepted');
  });
  renderSkeleton(dictating);
  notify('All corrections applied');
}

function signReport(){
  if(issues.length) notify(`${issues.length} unresolved issue${issues.length>1?'s':''} — review before signing`);
  else notify('Report signed successfully');
}

function hlCard(id){
  highlighted=id;
  document.querySelectorAll('.icard').forEach(c=>c.classList.remove('hi'));
  document.getElementById('card-'+id)?.classList.add('hi');
  // For dual-span discrepancies this finds the first (findings) span
  document.getElementById('editor').querySelector(`[data-id="${id}"]`)
    ?.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ═══════════════════════════════════════════════════════════════════════════
   HOVER POPOVER — shows Accept / Reject on any highlighted span
═══════════════════════════════════════════════════════════════════════════ */
let popoverEl=null, popoverHideTO=null;

function showPopover(id, anchorEl){
  const issue=issues.find(i=>i.id===id);
  if(!issue) return;
  removePopover();

  const isAutoGram = issue.issue_type==='Autocorrect' && issue.category==='Grammar';
  const isAuto = issue.issue_type==='Autocorrect';
  const isDualDisc = issue.category==='Discrepancy' && issue.findings_text && issue.impression_text;
  const hasSugg=!!issue.suggested_text;

  const div=document.createElement('div');
  div.className='hl-popover';
  div.id='hl-pop';

  let actsHtml='';
  if(isDualDisc && hasSugg){
    actsHtml=`<div class="hl-popover-acts" style="flex-wrap:wrap;gap:5px">
      <button class="hl-popover-dis" onclick="disFromPop('${id}')">Ignore</button>
      <button class="hl-popover-acc" onclick="accFindingsFromPop('${id}')">Fix Findings</button>
      <button class="hl-popover-acc" onclick="accImpressionFromPop('${id}')">Fix Impression</button>
    </div>`;
  } else if(isDualDisc){
    actsHtml=`<div class="hl-popover-acts">
      <button class="hl-popover-dis" onclick="disFromPop('${id}')">Ignore</button>
    </div>`;
  } else if(hasSugg && isAuto){
    actsHtml=`<div class="hl-popover-acts">
      <button class="hl-popover-dis" onclick="revertAutoFromPop('${id}')">Revert to "${esc(issue.original_text)}"</button>
    </div>`;
  } else if(hasSugg){
    actsHtml=`<div style="font-size:12px;color:var(--green);margin-bottom:6px;font-weight:500">→ ${esc(issue.suggested_text)}</div>
    <div class="hl-popover-acts">
      <button class="hl-popover-acc" onclick="accFromPop('${id}')">Accept</button>
      <button class="hl-popover-dis" onclick="disFromPop('${id}')">Dismiss</button>
    </div>`;
  } else {
    actsHtml=`<div class="hl-popover-acts">
      <button class="hl-popover-dis" onclick="disFromPop('${id}')">Dismiss</button>
    </div>`;
  }

  div.innerHTML=`
    <div class="hl-popover-reason">${esc(issue.reason)}</div>
    ${actsHtml}
    ${isAutoGram
      ? `<button class="hl-popover-vocab" onclick="addToVocabFromPop('${id}')">
           <i class="ti ti-book-2" style="font-size:11px"></i> Revert &amp; add "${esc(issue.original_text)}" to vocabulary
         </button>`
      : ''}`;

  document.body.appendChild(div);
  popoverEl=div;

  const rect=anchorEl.getBoundingClientRect();
  const popW=div.offsetWidth||220;
  let left=rect.left;
  let top=rect.bottom+6;
  if(left+popW > window.innerWidth-8) left=window.innerWidth-popW-8;
  if(top+div.offsetHeight > window.innerHeight-8) top=rect.top-div.offsetHeight-6;
  div.style.left=left+'px';
  div.style.top=top+'px';

  div.addEventListener('mouseenter',()=>clearTimeout(popoverHideTO));
  div.addEventListener('mouseleave',()=>{ popoverHideTO=setTimeout(removePopover,120); });
}

function removePopover(){
  if(popoverEl){ popoverEl.remove(); popoverEl=null; }
}

function accFromPop(id){ removePopover(); acc(id,null); }
function disFromPop(id){ removePopover(); dis(id,null); }
function addToVocabFromPop(id){ removePopover(); addToVocab(id); }
function accFindingsFromPop(id){ removePopover(); accFindings(id,null); }
function accImpressionFromPop(id){ removePopover(); accImpression(id,null); }
function revertAutoFromPop(id){ removePopover(); revertAuto(id,null); }

/* Revert an autocorrect — put the original misspelling back in the report */
function revertAuto(id,e){
  e?.stopPropagation();
  removePopover();
  const iss=issues.find(i=>i.id===id);
  if(!iss) return;
  if(iss.original_text&&iss.suggested_text){
    const re=new RegExp(iss.suggested_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    Object.keys(slotContent).forEach(token=>{
      slotContent[token]=slotContent[token].replace(re, iss.original_text);
    });
    if(freeEdit) editorText=editorText.replace(re, iss.original_text);
  }
  resolveIssue(iss, 'Reverted');
  renderSkeleton(dictating);
  notify('Correction reverted');
}

function addToVocab(id){
  const issue=issues.find(i=>i.id===id);
  if(!issue||!issue.original_text) return;
  const word=issue.original_text.toLowerCase();
  vocabulary.add(word);
  if(issue.suggested_text){
    const re=new RegExp(issue.suggested_text.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    Object.keys(slotContent).forEach(token=>{
      slotContent[token]=slotContent[token].replace(re, issue.original_text);
    });
    if(freeEdit) editorText=editorText.replace(re, issue.original_text);
  }
  resolveIssue(issue, 'Added to vocabulary');
  renderSkeleton(dictating);
  renderVocabTray();
  notify(`"${issue.original_text}" added to vocabulary — won't flag again`);
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESOLVED ISSUES — move addressed issues here so they can be undone
═══════════════════════════════════════════════════════════════════════════ */

/* Move an issue from active to resolved, storing a snapshot for undo */
function resolveIssue(issue, actionLabel){
  // Snapshot current text state so undo can restore it
  const snapshot = {
    slotContent: JSON.parse(JSON.stringify(slotContent)),
    editorText: editorText,
  };
  resolvedIssues.push({ issue, actionLabel, snapshot });
  // Remove from active
  issues = issues.filter(i => i.id !== issue.id);
  document.getElementById('card-' + issue.id)?.remove();
  bump(issues.length, false);
  renderResolved();
  if(!issues.length && resolvedIssues.length) {
    document.getElementById('qaList').innerHTML=
      `<div class="qa-empty" id="qaEmpty"><i class="ti ti-circle-check" style="color:var(--green)" aria-hidden="true"></i><span style="color:var(--green)">All issues addressed</span></div>`;
  }
}

function renderResolved(){
  const section = document.getElementById('resolvedSection');
  const body = document.getElementById('resolvedBody');
  const count = document.getElementById('resolvedCount');
  if(resolvedIssues.length === 0){
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  count.textContent = resolvedIssues.length;

  body.innerHTML = resolvedIssues.map(entry => {
    const issue = entry.issue;
    const bc = issue.category==='Discrepancy'?'ibd':issue.category==='Reimbursement'?'ibb':'ibm';
    const isDualDisc = issue.category==='Discrepancy' && issue.findings_text && issue.impression_text;

    let bodyHtml = '';
    if(isDualDisc){
      bodyHtml = `<div class="ibody" style="font-size:11px;color:var(--text3)">${esc(issue.findings_text)} / ${esc(issue.impression_text)}</div>`;
    } else if(issue.original_text && issue.suggested_text){
      bodyHtml = `<div class="ibody"><span class="iold">${esc(issue.original_text)}</span> <span class="inew">→ ${esc(issue.suggested_text)}</span></div>`;
    } else if(issue.original_text){
      bodyHtml = `<div class="ibody" style="color:var(--text3)">${esc(issue.original_text)}</div>`;
    }

    return `<div class="resolved-card">
      <div class="ihead">
        <span class="imeta">${esc(issue.label)}</span>
        <span class="ibdg ${bc}">${esc(issue.category)}</span>
      </div>
      <div class="resolved-action-label"><i class="ti ti-circle-check" aria-hidden="true"></i>${esc(entry.actionLabel)}</div>
      ${bodyHtml}
      <button class="btn-undo" onclick="undoResolve('${issue.id}')"><i class="ti ti-arrow-back-up" style="font-size:10px"></i> Undo</button>
    </div>`;
  }).join('');
}

function toggleResolved(){
  const body = document.getElementById('resolvedBody');
  const chev = document.getElementById('resolvedChevron');
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? 'block' : 'none';
  chev.className = hidden ? 'ti ti-chevron-down' : 'ti ti-chevron-right';
  chev.style.fontSize = '11px';
  chev.style.color = 'var(--text3)';
}

function undoResolve(id){
  const idx = resolvedIssues.findIndex(r => r.issue.id === id);
  if(idx === -1) return;
  const entry = resolvedIssues[idx];
  resolvedIssues.splice(idx, 1);

  // Restore text state from snapshot
  Object.assign(slotContent, entry.snapshot.slotContent);
  editorText = entry.snapshot.editorText;

  // Move issue back to active
  issues.push(entry.issue);
  bump(issues.length, true);

  // Remove empty state if present
  document.getElementById('qaEmpty')?.remove();

  // Add card back at top of list
  if(matches(entry.issue)){
    document.getElementById('qaList').insertAdjacentHTML('afterbegin', mkCard(entry.issue, true));
  }

  renderResolved();
  renderSkeleton(dictating);
  notify('Change undone');
}

function removeFromVocab(word){
  vocabulary.delete(word.toLowerCase());
  renderVocabTray();
  notify(`"${word}" removed from vocabulary`);
}

function renderVocabTray(){
  // Remove existing tray
  document.getElementById('vocabTray')?.remove();
  if(vocabulary.size===0) return;

  const words=[...vocabulary];
  const tray=document.createElement('div');
  tray.className='vocab-tray'; tray.id='vocabTray';
  tray.innerHTML=`
    <div class="vocab-tray-hdr" onclick="toggleVocabTray()">
      <span><i class="ti ti-book-2" style="font-size:11px;margin-right:4px"></i>Vocabulary (${words.length})</span>
      <i class="ti ti-chevron-down" id="vocabChevron" style="font-size:11px"></i>
    </div>
    <div class="vocab-tray-body" id="vocabTrayBody">
      ${words.map(w=>`<span class="vocab-pill">${esc(w)}<button onclick="removeFromVocab('${esc(w)}')" title="Remove">×</button></span>`).join('')}
    </div>`;
  // Insert before the issue list
  const list=document.getElementById('qaList');
  list.parentNode.insertBefore(tray, list);
}

function toggleVocabTray(){
  const body=document.getElementById('vocabTrayBody');
  const chev=document.getElementById('vocabChevron');
  if(!body) return;
  const hidden=body.style.display==='none';
  body.style.display=hidden?'flex':'none';
  chev.className=hidden?'ti ti-chevron-down':'ti ti-chevron-right';
  chev.style.fontSize='11px';
}

// Wire hover events on the editor via delegation
document.addEventListener('DOMContentLoaded',()=>{
  const ed=document.getElementById('editor');

  // Hover popover delegation
  ed.addEventListener('mouseover',e=>{
    const span=e.target.closest('[data-id]');
    if(span){
      clearTimeout(popoverHideTO);
      showPopover(span.dataset.id, span);
    }
  });
  ed.addEventListener('mouseleave',()=>{
    popoverHideTO=setTimeout(removePopover,120);
  });

  // Free-edit: auto-resolve issues when flagged text is changed
  ed.addEventListener('input',()=>{
    if(!freeEdit) return;

    // Read raw text BEFORE any rebuild — this reflects current DOM state including
    // characters the user just typed inside or around highlight spans.
    const rawText = getRawText(ed);

    // Determine which issues to resolve.
    // An issue resolves if ANY of these are true:
    //   a) original_text no longer appears verbatim in rawText
    //   b) for dual-span discrepancies: either findings_text OR impression_text was edited
    //   c) a highlight span for this issue no longer exists or its text changed (adjacent typing)
    const toResolve = issues.filter(issue => {
      if(!issue.original_text) return false;
      const ed2 = document.getElementById('editor');
      const isDualDisc = issue.category==='Discrepancy' && issue.findings_text && issue.impression_text;

      if(isDualDisc){
        // Resolve if either half has been touched
        const hasFindings = rawText.toLowerCase().includes(issue.findings_text.toLowerCase());
        const hasImpression = rawText.toLowerCase().includes(issue.impression_text.toLowerCase());
        if(!hasFindings || !hasImpression) return true;
        // Span integrity check for both spans
        const spans = ed2.querySelectorAll(`[data-id="${issue.id}"]`);
        if(spans.length < 2) return true; // one span destroyed = adjacent edit
        const findingsSpan = [...spans].find(s=>s.dataset.side==='findings');
        const impressionSpan = [...spans].find(s=>s.dataset.side==='impression');
        if(!findingsSpan || findingsSpan.textContent.toLowerCase()!==issue.findings_text.toLowerCase()) return true;
        if(!impressionSpan || impressionSpan.textContent.toLowerCase()!==issue.impression_text.toLowerCase()) return true;
        return false;
      }

      // Standard single-span issue
      const origLower = issue.original_text.toLowerCase();
      const hasOrig = rawText.toLowerCase().includes(origLower);

      if(issue.issue_type === 'Autocorrect'){
        // Autocorrect: the report shows the suggested_text in green.
        // Resolve if neither original NOR suggested text is present (user typed over it).
        const hasSugg = issue.suggested_text &&
          rawText.toLowerCase().includes(issue.suggested_text.toLowerCase());
        if(!hasOrig && !hasSugg) return true;
      } else {
        if(!hasOrig) return true;
      }

      // Span integrity check
      const span = ed2.querySelector(`[data-id="${issue.id}"]`);
      if(!span) return true;
      const autoNewEl = span.querySelector('.hl-auto-new');
      if(autoNewEl){
        if(autoNewEl.textContent.toLowerCase() !== (issue.suggested_text||'').toLowerCase()) return true;
      } else {
        const spanText = span.textContent.replace(/→.*$/,'').trim();
        if(spanText.toLowerCase() !== issue.original_text.toLowerCase()) return true;
      }

      return false;
    });

    editorText = rawText;

    if(toResolve.length > 0){
      removePopover();
      toResolve.forEach(issue => {
        resolveIssue(issue, 'Edited by user');
      });
    }

    // Always rebuild to re-apply (or clear) highlights
    rebuildFreeEditor();
  });
});

/* ═══════════════════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════════════════ */

/* Read the plain text currently in the editor, treating <br> as \n.
   Used BEFORE rebuilding to capture what the user actually typed.
   Critically: unwraps ALL highlight spans so we see only the real text,
   not the span wrappers which would preserve old flagged phrases verbatim. */
function getRawText(el){
  const clone = el.cloneNode(true);
  clone.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
  // Ghost suggestion pills contribute no real text
  clone.querySelectorAll('.hl-sugg').forEach(s => s.remove());
  // Autocorrect spans: collapse to just the corrected (green) word
  clone.querySelectorAll('.hl-auto').forEach(span => {
    const newPart = span.querySelector('.hl-auto-new');
    span.replaceWith(document.createTextNode(newPart ? newPart.textContent : span.textContent));
  });
  // Unwrap all other highlight spans — keep their text content
  clone.querySelectorAll('.hl-disc,.hl-gram,.hl-bill').forEach(span => {
    span.replaceWith(document.createTextNode(span.textContent));
  });
  return clone.textContent;
}

/* Extract plain text from editor for editorText sync — same as getRawText
   but also strips skeleton placeholders */
function extractPlainText(el){
  const clone=el.cloneNode(true);
  clone.querySelectorAll('br').forEach(br=>br.replaceWith('\n'));
  clone.querySelectorAll('.hl-sugg').forEach(s=>s.remove());
  clone.querySelectorAll('.hl-auto').forEach(span=>{
    const newSpan=span.querySelector('.hl-auto-new');
    span.replaceWith(document.createTextNode(newSpan ? newSpan.textContent : span.textContent));
  });
  clone.querySelectorAll('.hl-disc,.hl-gram,.hl-bill').forEach(span=>{
    span.replaceWith(document.createTextNode(span.textContent));
  });
  clone.querySelectorAll('.skel').forEach(s=>s.remove());
  return clone.textContent;
}
function resetQa(){
  issues=[]; triggered.clear(); resolvedIssues=[];
  pendingTOs.forEach(clearTimeout); pendingTOs=[]; processingN=0;
  document.getElementById('analyzing').classList.remove('on');
  bump(0,false);
  document.getElementById('resolvedSection').style.display='none';
  document.getElementById('resolvedBody').innerHTML='';
  emptyState('Issues appear as you dictate','ti-shield-check','var(--text3)');
}

function emptyState(msg,ico,col){
  document.getElementById('qaList').innerHTML=
    `<div class="qa-empty" id="qaEmpty"><i class="ti ${ico}" style="color:${col}" aria-hidden="true"></i><span style="color:${col}">${msg}</span></div>`;
  // Re-render vocab tray (it lives above the list, not inside it)
  renderVocabTray();
}

function esc(s){
  if(!s) return '';
  return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function notify(msg){
  const n=document.getElementById('notif');
  n.textContent=msg; n.classList.add('show');
  clearTimeout(window._nt); window._nt=setTimeout(()=>n.classList.remove('show'),2500);
}
